# HearthMage on Docker, sized for a home NAS (e.g. Synology Container Manager).
#
# Host networking is used on purpose: the app finds the hub by sweeping the
# LAN, which only works when the container shares the host's network. It also
# means no port mapping is needed - the app listens on the host directly
# (default 8080; DSM itself uses 5000/5001, so there is no clash).
#
# Deploy: put this repo on the NAS, create a Project in Container Manager
# pointing at this file, and start it. Container Manager builds the image from
# the Dockerfile at the repo root.

services:
  hearthmage:
    build:
      context: ..
      dockerfile: Dockerfile
    image: hearthmage
    container_name: hearthmage
    network_mode: host
    restart: unless-stopped
    volumes:
      # Persistent state: config, schedules, history.db, backups. A named volume
      # (not a host folder) so Docker gives it the image's uid-10001 ownership
      # automatically - no chown needed, which matters on a NAS. To move data in
      # or out, use the app's Export / Restore backup buttons on the settings
      # page rather than touching the volume directly.
      - hearthmage-data:/data
    environment:
      # All optional. Uncomment and set as needed; these seed the config on
      # first run and are otherwise managed from the settings page.
      # - HEARTHMAGE_PORT=8080
      # - HEARTHMAGE_BASE_IP=192.168.1.50      # hub IP; skip to auto-discover
      # - HEARTHMAGE_PASSWORD=change-me         # require a login (recommended)
      # - HEARTHMAGE_MQTT_HOST=192.168.1.10     # Home Assistant MQTT broker
      # - HEARTHMAGE_MQTT_USERNAME=hearthmage
      # - HEARTHMAGE_MQTT_PASSWORD=secret
      - HEARTHMAGE_LOG_LEVEL=INFO

volumes:
  hearthmage-data:
