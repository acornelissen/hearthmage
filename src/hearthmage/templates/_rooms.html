<section id="rooms" class="rooms">
  {% if error %}<p class="error" role="alert">{{ error }}</p>{% endif %}
  {% for room in rooms %}
  <article class="zone">
    <header class="zone-head">
      <h2 class="zone-name">{{ room.name }}</h2>
      <a class="zone-schedule" href="/zones/{{ room.id }}/schedule"
         aria-label="Schedule for {{ room.name }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="9"/><path d="M12 7v5l3 2"/></svg>
        <span>Schedule</span>
      </a>
      <a class="zone-schedule" href="/zones/{{ room.id }}/config"
         aria-label="Radiator settings for {{ room.name }}">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><circle cx="12" cy="12" r="3"/><path d="M12 3v2M12 19v2M3 12h2M19 12h2"/></svg>
        <span>Settings</span>
      </a>
    </header>

    {% set room_id = room.id %}
    {% include "_readout.html" %}

    <form class="setpoint" hx-post="/rooms/{{ room.id }}/temperature"
          hx-target="#readout-{{ room.id }}" hx-swap="outerHTML"
          hx-disabled-elt="find button.apply">
      <div class="stepper" data-stepper>
        <button type="button" class="step" data-step="-0.5"
                aria-label="Lower target for {{ room.name }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M5 12h14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
        <label class="setpoint-field">
          <span class="setpoint-label">Target &deg;C</span>
          <input class="setpoint-input" type="number" name="temperature" step="0.5"
                 inputmode="decimal" aria-label="Target temperature for {{ room.name }}"
                 min="{{ '%.1f'|format(room.min_temp) }}" max="{{ '%.1f'|format(room.max_temp) }}"
                 value="{{ '%.1f'|format(room.target_temp) if (room.target_temp is not none and not room.is_off) else '' }}">
        </label>
        <button type="button" class="step" data-step="0.5"
                aria-label="Raise target for {{ room.name }}">
          <svg viewBox="0 0 24 24" aria-hidden="true"><path d="M12 5v14M5 12h14" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"/></svg>
        </button>
      </div>
      <div class="setpoint-actions">
        <button type="submit" class="apply">Set target</button>
      </div>
    </form>

    <form class="setpoint-off" hx-post="/rooms/{{ room.id }}/temperature"
          hx-target="#readout-{{ room.id }}" hx-swap="outerHTML"
          hx-disabled-elt="find button">
      <input type="hidden" name="temperature" value="0">
      <button type="submit" class="off"{% if room.is_off %} disabled aria-disabled="true"{% endif %}
              aria-label="Turn {{ room.name }} off">Off</button>
    </form>
  </article>
  {% else %}
  {% if not error %}
  <div class="empty-state">
    <p>No rooms found on the hub yet.</p>
    <a class="btn" href="/settings">Check hub settings</a>
  </div>
  {% endif %}
  {% endfor %}
</section>
